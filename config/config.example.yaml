# Phase 4: copy to config/config.yaml (gitignored) and customize.
# Validated by infra/lib/config/schema.ts (Zod).
# Local secrets (GitHub OAuth client secret, cookie secret) are injected via
# AWS Secrets Manager, not this file.

project:
  name: cloud-dev-pods
  env: dev

aws:
  accountId: "123456789012"
  region: us-west-2

github:
  org: foolswithtools
  repo: cloud-dev-pods
  # GitHub org login that oauth2-proxy will allow into pod URLs.
  # Leave empty to allow only the single GitHub user matching OAUTH2_PROXY_GITHUB_USER.
  oauthAllowedOrg: foolswithtools

domain:
  # "byo": bring your own Route53 hosted zone (recommended).
  # "alb-default": use ALB DNS + self-signed cert (non-prod).
  strategy: alb-default
  baseDomain: pods.example.com
  hostedZoneId: ZEXAMPLEZONEID

network:
  vpcCidr: "10.0.0.0/16"
  # 1 NAT (cheaper, single point of failure) or 2 NAT (HA, double cost).
  natGateways: 1
  # Set to true to add ECR / Secrets / Logs interface endpoints (saves NAT
  # data-transfer charges; adds ~$22/mo per endpoint per AZ).
  useVpcEndpoints: false

pods:
  defaultCpu: 1024
  defaultMemory: 2048
  spotPercentage: 100
  idleMinutes: 60

naming:
  prefix: CloudDevPods

efs:
  # When true, the EFS filesystem in ClusterStack is provisioned with
  # RemovalPolicy.RETAIN, so `cluster-down` leaves it (and any /workspace
  # data) behind. Default false sets RemovalPolicy.DESTROY — the filesystem
  # is destroyed with the cluster, avoiding orphan filesystems and the
  # name-collision footgun on the next `cluster-up`. Flip to `true` only if
  # this template is hosting data you genuinely cannot afford to lose on an
  # explicit `cluster-down`. See ADR 0007.
  retainOnClusterDown: false
