version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directories:
      - "/"
      - "/infra"
    schedule:
      interval: weekly
    groups:
      aws-cdk:
        patterns:
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "constructs"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      # esbuild is pre-1.0; every minor is breaking. Keep it isolated
      # so it gets human review and a smoke test before merge.
      dev-zero-x:
        patterns:
          - "esbuild"
        update-types:
          - "minor"
          - "major"
      dev:
        dependency-type: development
        exclude-patterns:
          - "esbuild"
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "constructs"

  - package-ecosystem: docker
    directory: /runtime/vscode-browser
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /runtime/vscode-tunnel
    schedule:
      interval: weekly
    # Stay on Ubuntu LTS. 26.04 is an interim release (9-month support);
    # let Dependabot propose the next LTS only.
    ignore:
      - dependency-name: "ubuntu"
        update-types:
          - "version-update:semver-major"
