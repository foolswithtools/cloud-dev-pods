version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      aws-cdk:
        patterns:
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "constructs"
      dev:
        dependency-type: development

  - package-ecosystem: docker
    directory: /runtime/vscode-browser
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /runtime/vscode-tunnel
    schedule:
      interval: weekly
