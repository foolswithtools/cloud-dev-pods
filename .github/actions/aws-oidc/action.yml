name: Configure AWS via GitHub OIDC
description: Assume the deployer or pod-ops role using GitHub's OIDC token. No long-lived AWS keys.
inputs:
  role-to-assume:
    description: ARN of the IAM role to assume.
    required: true
  aws-region:
    description: AWS region.
    required: true
  role-session-name:
    description: Session name (visible in CloudTrail). Default uses run id + job.
    required: false
    default: gha-${{ github.run_id }}-${{ github.job }}
runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        role-session-name: ${{ inputs.role-session-name }}
        aws-region: ${{ inputs.aws-region }}
