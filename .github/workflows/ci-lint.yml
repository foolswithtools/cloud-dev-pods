name: ci-lint
# Phase 3: actionlint, markdownlint, shellcheck, lychee link-check.
# eslint and cdk-synth land in later phases when they have more code to validate.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: actionlint (validate workflow YAML)
        # The rhysd/actionlint repo doesn't publish a `v1` major-version alias;
        # install the binary instead.
        run: |
          set -euo pipefail
          AL_VERSION=1.7.12
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${AL_VERSION}/actionlint_${AL_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /tmp actionlint
          /tmp/actionlint -color

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !node_modules
            !.cdk.staging
            !cdk.out

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: "."
          format: gcc

      - name: lychee link-check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 2
            --timeout 20
            --exclude '^https://github.com/.+/security/advisories/new'
            --exclude '^https://github.com/settings/'
            --exclude '^https://github.com/organizations/'
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            './**/*.md'
          fail: true
