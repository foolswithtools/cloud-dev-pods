name: release
# Phase 13: release-please in manifest mode.
#
# release-please reads Conventional Commits since the last tag and opens a
# "chore(main): release vX.Y.Z" PR that bumps `package.json` + writes
# `CHANGELOG.md`. Merging the release PR creates a git tag and a GitHub
# Release with the changelog excerpt as the release notes.
#
# downstream-sync (Phase 10) consumes the version bumps for its
# patch/minor/major categorization in sync-upstream PRs.
#
# Auth: a dedicated GitHub App mints an installation token. PRs opened by
# the runner-issued GITHUB_TOKEN do not trigger workflow runs (a GitHub
# anti-recursion safeguard), so required status checks would never report
# and the release PR is unmergeable. App-token-authored PRs trigger
# workflows normally. See docs/maintainer-runbook.md → "Release App setup".

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository == 'foolswithtools/cloud-dev-pods'
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}
