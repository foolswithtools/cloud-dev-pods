name: sync-upstream
# Open a PR with upstream changes (foolswithtools/cloud-dev-pods@main).
# Categorizes paths via .upstream-sync.toml (tracked / merged / user) and
# applies them accordingly. Never auto-merges; the user reviews and merges.

on:
  workflow_dispatch:
    inputs:
      upstream_url:
        description: "Upstream repo URL (default: foolswithtools/cloud-dev-pods)."
        required: false
        default: "https://github.com/foolswithtools/cloud-dev-pods.git"
        type: string
      upstream_branch:
        description: "Upstream branch."
        required: false
        default: "main"
        type: string
  schedule:
    - cron: "17 9 * * 1"

permissions: {}

jobs:
  guard:
    runs-on: ubuntu-latest
    if: github.repository != 'foolswithtools/cloud-dev-pods'
    permissions:
      contents: read
    steps:
      - run: echo "Syncing upstream into ${{ github.repository }}."

  sync:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        id: sync
        run: |
          set -euo pipefail
          OUTPUT=$(npx tsx scripts/sync-upstream.ts \
            --upstream-url "${{ inputs.upstream_url || 'https://github.com/foolswithtools/cloud-dev-pods.git' }}" \
            --upstream-branch "${{ inputs.upstream_branch || 'main' }}")
          echo "$OUTPUT"
          {
            echo "from_sha=$(echo "$OUTPUT" | jq -r .fromSha)"
            echo "to_sha=$(echo "$OUTPUT" | jq -r .toSha)"
            echo "files_changed=$(echo "$OUTPUT" | jq -r .filesChanged)"
            echo "tracked_count=$(echo "$OUTPUT" | jq -r '.tracked | length')"
            echo "merged_count=$(echo "$OUTPUT" | jq -r '.merged | length')"
            echo "conflicted_count=$(echo "$OUTPUT" | jq -r '.conflicted | length')"
            echo "skipped_count=$(echo "$OUTPUT" | jq -r '.skipped | length')"
            echo "deleted_count=$(echo "$OUTPUT" | jq -r '.deleted | length')"
            echo "unmatched_count=$(echo "$OUTPUT" | jq -r '.unmatched | length')"
            echo "version_bump=$(echo "$OUTPUT" | jq -r .versionBump.kind)"
            echo "version_from=$(echo "$OUTPUT" | jq -r .versionBump.from)"
            echo "version_to=$(echo "$OUTPUT" | jq -r .versionBump.to)"
          } >> "$GITHUB_OUTPUT"
          # Persist the verbose JSON for the PR body step.
          echo "$OUTPUT" > /tmp/sync-result.json

      - name: Build PR body
        if: steps.sync.outputs.files_changed != '0'
        id: body
        run: |
          set -euo pipefail
          conflicts=$(jq -r '.conflicted[]?' /tmp/sync-result.json)
          if [ -n "$conflicts" ]; then
            # shellcheck disable=SC2001  # multi-line stream; parameter expansion is awkward here
            CONFLICT_BLOCK=$'\n### Conflicted files (resolve before merging)\n\n'$(echo "$conflicts" | sed 's/^/- /')$'\n'
          else
            CONFLICT_BLOCK=''
          fi
          {
            echo 'body<<SYNC_BODY_EOF'
            cat <<EOF
          ## Upstream sync — ${{ steps.sync.outputs.version_bump }} bump${{ steps.sync.outputs.version_from && format(' ({0} → {1})', steps.sync.outputs.version_from, steps.sync.outputs.version_to) || '' }}

          | | |
          |---|---|
          | From | \`${{ steps.sync.outputs.from_sha }}\` |
          | To | \`${{ steps.sync.outputs.to_sha }}\` |
          | Files changed | ${{ steps.sync.outputs.files_changed }} |
          | Tracked (overwritten) | ${{ steps.sync.outputs.tracked_count }} |
          | Merged (three-way) | ${{ steps.sync.outputs.merged_count }} |
          | Conflicts | ${{ steps.sync.outputs.conflicted_count }} |
          | Skipped (\`[user]\`) | ${{ steps.sync.outputs.skipped_count }} |
          | Deleted | ${{ steps.sync.outputs.deleted_count }} |
          | Unmatched (defaulted to tracked) | ${{ steps.sync.outputs.unmatched_count }} |
          ${CONFLICT_BLOCK}
          See \`.upstream-sync.toml\` for path classification rules.
          See \`docs/extending.md\` for how to customize without forking \`[tracked]\` files.

          🤖 Auto-generated by \`sync-upstream.yml\`. Never auto-merged.
          EOF
            echo 'SYNC_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open / update PR
        if: steps.sync.outputs.files_changed != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/sync-upstream-${{ steps.sync.outputs.to_sha }}
          delete-branch: true
          commit-message: "chore(sync): upstream ${{ steps.sync.outputs.from_sha }} -> ${{ steps.sync.outputs.to_sha }}"
          title: "chore(sync): upstream ${{ steps.sync.outputs.version_bump }} (${{ steps.sync.outputs.files_changed }} files)"
          body: ${{ steps.body.outputs.body }}
          labels: |
            sync-upstream
            chore
          add-paths: |
            .
