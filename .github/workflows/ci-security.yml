name: ci-security
# Phase 3: gitleaks (secret scanning), trivy fs (filesystem CVE scan against runtime/),
# osv-scanner (OSV vulns against npm + lockfile).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan all commits, not just the PR diff.
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Public repos under orgs do not require GITLEAKS_LICENSE.
          # https://github.com/gitleaks/gitleaks-action#-pricing
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: trivy filesystem (runtime/)
        # aquasecurity/trivy-action@v0.36.0 pulls in aquasecurity/setup-trivy
        # which isn't in this repo's Actions allowlist. Install the binary
        # directly instead, matching the actionlint and osv-scanner pattern.
        run: |
          set -euo pipefail
          TRIVY_VERSION=0.58.1
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar xz -C /tmp trivy
          /tmp/trivy fs runtime \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed

      - name: osv-scanner (install + run)
        # google/osv-scanner-action is a reusable workflow, not a step action,
        # so we install the binary directly. This is Google's documented alternative.
        run: |
          set -euo pipefail
          OSV_VERSION=1.9.1
          curl -sSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o /tmp/osv-scanner
          chmod +x /tmp/osv-scanner
          /tmp/osv-scanner --recursive --skip-git --lockfile=package-lock.json .
