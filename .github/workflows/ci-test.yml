name: ci-test
# Phase 3: tsc build + vitest unit tests across all workspaces.
# cdk-synth + cdk-nag are added in Phase 4 once the stacks have real bodies.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npx tsc -b infra scripts --noEmit

      - name: Unit tests (vitest)
        run: npm test -- --reporter=verbose
