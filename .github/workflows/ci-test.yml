name: ci-test
# Phase 3 + 4: tsc build + vitest unit tests + cdk synth + cdk-nag aspect.
# cdk-nag emits findings as synth-time warnings; explicit suppressions live
# in each stack with justification.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npx tsc -b infra scripts --noEmit

      - name: Unit tests (vitest)
        run: npm test -- --reporter=verbose

  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: cdk synth
        env:
          CDPODS_CONFIG: ${{ github.workspace }}/config/config.example.yaml
        run: npm run synth

      - name: Upload synthesized templates
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cdk-out
          path: infra/cdk.out
          retention-days: 7
