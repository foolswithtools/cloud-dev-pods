name: Bug report
description: Something is broken in cloud-dev-pods.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect, what did you observe?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Exact `gh workflow run` invocations or local commands that trigger the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cloud-dev-pods version
      description: Output of `cat .upstream-sync.state.local` or your fork's `package.json` version.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant CloudWatch / GitHub Actions log excerpts. Redact account IDs, tokens.
    validations:
      required: false
